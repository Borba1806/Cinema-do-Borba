<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Cinema do Borba</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎬 Cinema do Borba</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <section class="banner">
    <h2>Meus Filmes Favoritos</h2>
    <p>Uma vitrine especial com alguns filmes que eu adoro!</p>
  </section>

  <main class="container">
    <div class="card">
      <img src="https://www.genspark.ai/api/files/s/M99AHL6q" alt="Pôster do filme Transformers" />
      <h3>Transformers</h3>
      <button onclick="mostrarFilme('transformers')">Ver destaque</button>
    </div>

    <div class="card">
      <img src="https://www.genspark.ai/api/files/s/ZaWPC6AF" alt="Pôster do filme Como Treinar o Seu Dragão" />
      <h3>Como Treinar o Seu Dragão</h3>
      <button onclick="mostrarFilme('dragao')">Ver destaque</button>
    </div>

    <div class="card">
      <img src="https://www.genspark.ai/api/files/s/MfJVAGyI" alt="Pôster do filme Até o Último Homem" />
      <h3>Até o Último Homem</h3>
      <button onclick="mostrarFilme('ultimoHomem')">Ver destaque</button>
    </div>
  </main>

  <section id="destaque" class="modal oculto">
    <div class="modal-conteudo">
      <span class="fechar" onclick="fecharModal()">&times;</span>
      <h2 id="tituloFilme"></h2>
      <p id="infoFilme"></p>
      <a id="trailerFilme" href="#" target="_blank">▶ Assistir trailer</a>
    </div>
  </section>

  <footer>
    <p>© 2026 - Cinema do Borba</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
