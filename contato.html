<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato - Cinema do Borba</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎬 Cinema do Borba</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <section class="banner">
    <h2>Entre em Contato</h2>
    <p>Quer falar sobre filmes? Envie sua mensagem!</p>
  </section>

  <main class="contato-container">
    <form id="formContato">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required />

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" rows="6" placeholder="Escreva sua mensagem" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </main>

  <footer>
    <p>© 2026 - Cinema do Borba</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
